server:
  port: ${PORT}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    stream:
      username: guest
      password: guest
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: smpt.gmail.com
    port: 587
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          enable: true
          starttls:
            auth: true
